<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="fav.svg" />
  <title>Message Sent | Michael Brewer</title>
  <style>
    html {
      box-sizing: border-box;
    }
    *, *::before, *::after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #f8fafc;
      background-color: #0f172a;
      background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.24), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.16), transparent 24%),
                        linear-gradient(180deg, rgba(15, 23, 42, 0.9) 0%, rgba(17, 24, 39, 0.94) 100%);
      padding: 24px;
      text-align: center;
    }
    .card {
      width: min(680px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(30, 41, 59, 0.55);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      padding: clamp(24px, 5vw, 36px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: #e2e8f0;
    }
    p {
      margin: 0;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.65;
    }
    .redirect-note {
      margin-top: 14px;
      color: #93c5fd;
      font-weight: 600;
    }
    a {
      color: #bfdbfe;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="success-title">
    <h1 id="success-title">Thanks! Your message was sent.</h1>
    <p>I appreciate you reaching out. You will be redirected to the home page in <span id="countdown">5</span> seconds.</p>
    <p class="redirect-note">If the redirect does not happen, use <a id="home-link" href="index.html">this link</a>.</p>
  </main>

  <script>
    const homeUrl = new URL('index.html', window.location.href).href;
    const homeLink = document.getElementById('home-link');
    const countdownEl = document.getElementById('countdown');
    let secondsRemaining = 5;

    if (homeLink) {
      homeLink.href = homeUrl;
    }

    const intervalId = setInterval(() => {
      secondsRemaining -= 1;
      if (countdownEl && secondsRemaining >= 0) {
        countdownEl.textContent = String(secondsRemaining);
      }
      if (secondsRemaining <= 0) {
        clearInterval(intervalId);
        window.location.replace(homeUrl);
      }
    }, 1000);
  </script>
</body>
</html>
