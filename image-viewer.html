<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer | Michael Brewer</title>
  <style>
    html {
      box-sizing: border-box;
    }
    *, *::before, *::after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .viewer-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }
    nav {
      display: flex;
      gap: 20px;
      justify-content: flex-end;
      flex-wrap: wrap;
      align-items: center;
    }
    nav a,
    .back-link {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link {
      margin-right: auto;
      color: #cbd5e1;
    }
    .back-link:hover {
      color: #fff;
    }
    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      cursor: pointer;
      font-size: 1.35rem;
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .menu-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .viewer-main {
      width: min(1400px, 96%);
      margin: 20px auto 28px;
    }
    .image-frame {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
    }
    .image-frame img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }
    .viewer-note {
      margin: 12px 4px 0;
      color: #cbd5e1;
      font-size: 0.93rem;
    }
    .site-footer {
      border-top: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.95);
      padding: 90px 0 108px;
      margin-top: 24px;
    }
    .site-footer-inner {
      text-align: center;
    }
    .site-footer-title {
      margin: 0 0 10px;
      color: #f8fafc;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .site-footer-title-link {
      color: inherit;
      text-decoration: none;
    }
    .site-footer-title-link:hover,
    .site-footer-title-link:focus-visible {
      color: #ffffff;
      text-decoration: underline;
    }
    .site-footer-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .site-footer-social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(30, 41, 59, 0.65);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }
    .site-footer-social-link:hover {
      transform: translateY(-1px);
      background: rgba(37, 99, 235, 0.2);
      border-color: rgba(147, 197, 253, 0.7);
    }
    .site-footer-social-link:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.85);
      outline-offset: 2px;
    }
    .site-footer-icon {
      display: block;
      max-width: 36px;
      max-height: 36px;
      width: auto;
      height: auto;
    }
    .site-footer-icon-github {
      max-width: 40px;
      max-height: 40px;
      transform: translateY(1px);
    }
    .site-footer-icon-linkedin {
      max-height: 29px;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .site-footer a {
      color: #bfdbfe;
      text-decoration: none;
      font-weight: 600;
    }
    .site-footer a:hover {
      color: #ffffff;
    }
    .site-footer-contact {
      margin: 0;
      color: #cbd5e1;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .site-footer-noscript {
      margin: 10px 0 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    @media (max-width: 860px) {
      .menu-toggle {
        display: inline-flex;
      }
      nav {
        position: absolute;
        top: 100%;
        right: 0;
        left: 0;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 0;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.35s ease;
        background-color: rgba(15, 23, 42, 0.95);
        border-radius: 0 0 18px 18px;
        z-index: 1001;
      }
      nav.open {
        max-height: 520px;
        padding: 18px 0 22px;
      }
      nav a {
        width: min(260px, 100%);
        text-align: center;
        padding: 10px 0;
      }
      .site-footer-contact {
        flex-direction: column;
        gap: 8px;
      }
      .site-footer-social-link {
        width: 54px;
        height: 54px;
      }
    }
  </style>
</head>
<body>
  <header class="viewer-header">
    <div class="container">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 24px; position: relative; padding: 14px 0;">
        <a id="back-button" class="back-link" href="index.html">← Back to Portfolio</a>
        <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
        <nav>
          <a href="index.html">Home</a>
          <a href="index.html#projects">Projects</a>
          <a href="index.html#experience">Experience</a>
          <a href="index.html#education">Education</a>
          <a href="index.html#testimonials">Testimonials</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="viewer-main">
    <div class="image-frame">
      <img id="viewer-image" src="" alt="Project visualization" />
    </div>
    <p class="viewer-note">Tip: Use pinch-to-zoom on mobile or browser zoom controls on desktop.</p>
  </main>

  <footer class="site-footer">
    <div class="container site-footer-inner">
      <p class="site-footer-title"><a class="site-footer-title-link" href="contact.html">Connect With Michael Brewer</a></p>
      <div class="site-footer-links" aria-label="Professional profiles">
        <a class="site-footer-social-link" href="https://github.com/michael-brewer-ds" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
          <img class="site-footer-icon site-footer-icon-github" src="GitHub_Invertocat_White_Clearspace.png" alt="" aria-hidden="true" />
          <span class="visually-hidden">GitHub</span>
        </a>
        <a class="site-footer-social-link" href="https://www.linkedin.com/in/wordbrewer/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
          <img class="site-footer-icon site-footer-icon-linkedin" src="InBug-White.png" alt="" aria-hidden="true" />
          <span class="visually-hidden">LinkedIn</span>
        </a>
      </div>
      <p class="site-footer-contact">
        <span>Email: <a id="footer-email" href="#">Loading...</a></span>
        <span>Phone: <a id="footer-phone" href="#">Loading...</a></span>
      </p>
      <noscript>
        <p class="site-footer-noscript">Email: michael [at] wordbrewer [dot] com | Phone: (nine seven one) two six eight - eight four seven nine</p>
      </noscript>
    </div>
  </footer>

  <script>
    const decodeFooterValue = value => {
      try {
        return atob(value);
      } catch {
        return '';
      }
    };

    const emailValue = decodeFooterValue('bWljaGFlbEB3b3JkYnJld2VyLmNvbQ==');
    const phoneValue = decodeFooterValue('KDk3MSkgMjY4LTg0Nzk=');
    const mailtoPrefix = decodeFooterValue('bWFpbHRvOg==');
    const telPrefix = decodeFooterValue('dGVsOg==');
    const footerEmail = document.getElementById('footer-email');
    const footerPhone = document.getElementById('footer-phone');

    if (footerEmail && emailValue) {
      footerEmail.textContent = emailValue;
      footerEmail.href = `${mailtoPrefix}${emailValue}`;
    }
    if (footerPhone && phoneValue) {
      footerPhone.textContent = phoneValue;
      footerPhone.href = `${telPrefix}${phoneValue.replace(/[^\d+]/g, '')}`;
    }

    const params = new URLSearchParams(window.location.search);
    const imagePath = params.get('img');
    const fromPath = params.get('from') || 'index.html';

    const viewerImage = document.getElementById('viewer-image');
    const backButton = document.getElementById('back-button');
    const menuToggle = document.querySelector('.menu-toggle');
    const pageNav = document.querySelector('nav');

    if (!imagePath) {
      window.location.href = fromPath;
    } else {
      viewerImage.src = imagePath;
      backButton.href = fromPath;
    }

    backButton.addEventListener('click', event => {
      if (history.length > 1) {
        event.preventDefault();
        history.back();
      }
    });

    menuToggle?.addEventListener('click', () => {
      pageNav?.classList.toggle('open');
    });

    document.querySelectorAll('nav a').forEach(link => {
      link.addEventListener('click', () => {
        pageNav?.classList.remove('open');
      });
    });
  </script>
</body>
</html>
