<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer | Michael Brewer</title>
  <style>
    html {
      box-sizing: border-box;
    }
    *, *::before, *::after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      line-height: 1.6;
      min-height: 100vh;
    }
    .viewer-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .viewer-main {
      width: min(1400px, 96%);
      margin: 20px auto 28px;
    }
    .image-frame {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
    }
    .image-frame img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }
    .viewer-note {
      margin: 12px 4px 0;
      color: #cbd5e1;
      font-size: 0.93rem;
    }
  </style>
</head>
<body>
  <header class="viewer-header">
    <a id="back-button" class="nav-button" href="index.html">Back</a>
    <a class="nav-button" href="index.html">Home</a>
  </header>

  <main class="viewer-main">
    <div class="image-frame">
      <img id="viewer-image" src="" alt="Project visualization" />
    </div>
    <p class="viewer-note">Tip: Use pinch-to-zoom on mobile or browser zoom controls on desktop.</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const imagePath = params.get('img');
    const fromPath = params.get('from') || 'index.html';

    const viewerImage = document.getElementById('viewer-image');
    const backButton = document.getElementById('back-button');

    if (!imagePath) {
      window.location.href = fromPath;
    } else {
      viewerImage.src = imagePath;
      backButton.href = fromPath;
    }

    backButton.addEventListener('click', event => {
      if (document.referrer && history.length > 1) {
        event.preventDefault();
        history.back();
      }
    });
  </script>
</body>
</html>
